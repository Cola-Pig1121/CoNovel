version: '3.8'

services:
  # CoNovel Studio (Frontend)
  studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: studio
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/conovel.db
    volumes:
      - conovel-data:/app/data
    restart: unless-stopped

  # CoNovel Core API (Optional - for headless mode)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/conovel.db
    volumes:
      - conovel-data:/app/data
    restart: unless-stopped
    profiles:
      - api

  # SQLite with WAL mode for better concurrency (Optional)
  # Note: For production, consider using PostgreSQL
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: conovel
  #     POSTGRES_USER: conovel
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-conovel_secret}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   profiles:
  #     - postgres

volumes:
  conovel-data:
  # postgres-data:
